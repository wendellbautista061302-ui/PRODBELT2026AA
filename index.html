<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PROD2026 MASTER CLOUD | Labor & Materials</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <!-- Firebase SDK — cross-device live sync -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* avoid accidental selection on mobile, but inputs remain editable */
        }
        body {
            margin: 0;
            background: #f0f2f5;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        /* GLOBAL RESET / MODAL FIXES */
        #masterModalOverlay {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            backdrop-filter: blur(8px);
            overflow-y: auto;
        }
        #modalContentContainer {
            background-color: #f0f2f5;
            min-height: 100vh;
            width: 100%;
            position: relative;
        }
        /* SELECTION VIEW */
        #selectionView {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .card-choice {
            display: inline-block;
            width: 260px;
            padding: 45px 20px;
            margin: 15px;
            background: white;
            border: 3px solid #2c3e50;
            border-radius: 24px;
            color: #2c3e50;
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .card-choice:hover {
            background: #2c3e50;
            color: white;
            transform: scale(1.02);
        }
        /* GLOBAL BUTTON STYLES */
        .btn-nav {
            padding: 12px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 800;
            color: white;
            transition: 0.2s;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .scanner-card {
            background: white;
            padding: 32px;
            border-radius: 36px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            border-top: 12px solid #4e342e;
        }
        .big-input {
            width: 90%;
            padding: 18px;
            font-size: 28px;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            text-align: center;
            font-weight: 800;
            background: #fefce8;
            text-transform: uppercase;
        }
        .process-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 12px;
            margin-top: 24px;
        }
        .proc-btn {
            background: #fff;
            border: 2px solid #4e342e;
            padding: 14px 8px;
            border-radius: 40px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.1s;
        }
        .worker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .worker-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .worker-header {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 20px;
        }
        .worker-photo {
            width: 80px;
            height: 80px;
            border-radius: 40px;
            object-fit: cover;
            border: 3px solid #f1f5f9;
            background: #e2e8f0;
        }
        .job-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            background: #f8fafc;
            border-radius: 24px;
            margin-bottom: 8px;
        }
        .eff-badge {
            padding: 4px 12px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 12px;
        }
        .bg-pass { background: #22c55e; color: white; }
        .bg-fail { background: #ef4444; color: white; }
        .bg-active { background: #3b82f6; color: white; }
        /* JO HISTORY / LEADERBOARD */
        #scannerLeaderboardRow {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            max-width: 1500px;
            margin: 0 auto 30px auto;
        }
        #joHistoryPanel {
            width: 250px;
            background: white;
            border-radius: 28px;
            padding: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            max-height: 550px;
            overflow-y: auto;
        }
        #sideLeaderboard {
            width: 260px;
            background: white;
            border-radius: 28px;
            padding: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .slb-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 20px;
            margin-bottom: 6px;
            background: #f8fafc;
        }
        .joh-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-radius: 18px;
            margin-bottom: 6px;
            background: #f8fafc;
            cursor: pointer;
        }
        /* MATERIALS VIEW */
        #materialsView {
            display: none;
            flex-direction: row;
            height: 100vh;
            width: 100%;
            background: #f1f5f9;
        }
        #mat-sidebar {
            width: 280px;
            background: white;
            border-right: 2px solid #e2e8f0;
            overflow-y: auto;
        }
        .pending-card {
            border: 2px solid #000;
            border-radius: 16px;
            padding: 12px;
            margin: 12px;
            text-align: center;
            cursor: pointer;
        }
        .scanner-box {
            background: #000;
            color: white;
            padding: 20px;
            border-radius: 28px;
            text-align: center;
        }
        .step-dot {
            flex: 1;
            text-align: center;
            font-weight: 800;
            padding: 8px;
            border-bottom: 3px solid #cbd5e1;
        }
        .step-dot.active { border-bottom-color: #ff6b00; color: #ff6b00; }
        .mat-btn {
            background: white;
            border: 2px solid #000;
            padding: 12px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top:0;left:0;width:100%;height:100%;
            background: rgba(0,0,0,0.7);
            z-index: 20001;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 480px;
        }
        /* fixes for missing elements */
        .no-print { }
        #jos-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 8px 24px; border-radius: 60px; z-index: 30000; opacity: 0; transition: 0.2s; }
        #jos-toast.show { opacity: 1; }
        .btn-row-del { background: #ffe4e4; border: none; border-radius: 20px; padding: 4px 10px; cursor: pointer; }
        .worker-suggestion { display: flex; align-items: center; gap: 12px; padding: 8px; background: #f1f5f9; border-radius: 60px; margin-bottom: 6px; cursor: pointer; }
        .photo-picker-btn { background: #3b82f6; border-radius: 30px; padding: 4px 8px; font-size: 12px; cursor: pointer; display: inline-block; margin-top: 4px; }
        .fb-count-badge { background: #ef4444; color: white; border-radius: 40px; padding: 2px 8px; font-size: 10px; margin-left: 6px; }
        /* responsive */
        @media (max-width: 900px) {
            #scannerLeaderboardRow { flex-wrap: wrap; }
            #joHistoryPanel, #sideLeaderboard { width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>
<div id="masterModalOverlay">
    <div id="modalContentContainer">
        <!-- SELECTION VIEW -->
        <div id="selectionView">
            <h1 style="color:#1e293b;">PRODUCTION MASTER SYSTEM</h1>
            <div>
                <div class="card-choice" onclick="switchToLabor()">⚙️ LABOR SYSTEM</div>
                <div class="card-choice" onclick="switchToMaterials()">📦 MATERIALS SYSTEM</div>
            </div>
        </div>

        <!-- LABOR VIEW -->
        <div id="laborView" style="display:none; padding:20px;">
            <div class="nav-header" style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-bottom:20px;">
                <button class="btn-nav" style="background:#64748b" onclick="backToMenu()">⬅ BACK</button>
                <button class="btn-nav" style="background:#4e342e" onclick="toggleAdmin()">⚙️ SETTINGS</button>
                <button class="btn-nav" style="background:#b8860b" onclick="openStatsWithLock()">📈 WORKER STATS</button>
                <button class="btn-nav" style="background:#0f766e" onclick="openAttendance()">🗓️ ATTENDANCE</button>
                <button class="btn-nav" style="background:#b45309" onclick="openJOCostTracker()">💰 J.O. COST</button>
                <button class="btn-nav" style="background:#6d28d9" onclick="openJOScheduler()">📅 J.O. SCHEDULER <span id="fb-sync-dot" style="background:#f59e0b; width:10px;height:10px;border-radius:50%;display:inline-block;"></span></button>
                <button class="btn-nav" style="background:#15803d" onclick="exportToCostlive()">📤 SYNC TO COSTLIVE</button>
                <button class="btn-nav" style="background:#dc2626" onclick="resetDay()">🗑️ RESET LIST</button>
            </div>
            <div id="adminPanel" style="display:none; background:white; border-radius:32px; padding:20px; margin-bottom:20px;"></div>
            <div id="statsPanel" style="display:none;"></div>
            <div id="scannerLeaderboardRow">
                <div id="joHistoryPanel" style="background:white; border-radius:28px; padding:16px;"><div class="joh-title">📋 J.O. HISTORY</div><div id="joHistoryList">Loading...</div></div>
                <div id="mainCard" class="scanner-card">
                    <h2>PRODUCTION SCANNER</h2>
                    <div id="step1">
                        <div class="step-label">🔽 SCAN J.O. (LAST 4 DIGITS)</div>
                        <input type="text" id="scanJO" class="big-input" placeholder="ENTER LAST 4 DIGITS" autofocus>
                    </div>
                    <div id="step2" style="display:none;">
                        <div class="step-label">🧑‍🏭 WORKER NAME</div>
                        <input type="text" id="scanName" class="big-input" placeholder="TYPE NAME" oninput="filterWorkerSuggestions(this.value)">
                        <div id="workerSuggestList"></div>
                        <button onclick="resetSteps()" style="margin-top:15px;">⬅ BACK</button>
                    </div>
                    <div id="step3" style="display:none;">
                        <div class="step-label">⚙️ SELECT PROCESS</div>
                        <div id="displayJO" style="font-weight:900; font-size:24px;"></div>
                        <div id="displayName" style="font-weight:700;"></div>
                        <input type="text" id="scanProcessInp" class="big-input" placeholder="SCAN PROCESS" style="margin:12px 0;">
                        <div id="procPickerGrid" class="process-grid"></div>
                        <button onclick="resetSteps()">CANCEL</button>
                    </div>
                </div>
                <div id="sideLeaderboard"><div class="slb-title">🏆 POINTS LEADERBOARD</div><div id="sideLeaderboardList">—</div></div>
            </div>
            <div id="workerGrid" class="worker-grid"></div>
        </div>

        <!-- MATERIALS VIEW (fixed visibility) -->
        <div id="materialsView" style="display:none; flex-direction:row;">
            <div id="mat-sidebar">
                <div style="padding:16px; font-weight:900;">📦 PENDING TICKETS</div>
                <button class="btn-nav" style="background:#64748b; margin:8px;" onclick="backToMenu()">⬅ MENU</button>
                <div id="pending-list" style="padding:8px;"></div>
            </div>
            <div class="mat-main-content" style="flex:1; padding:30px;">
                <div style="background:white; border-radius:28px; padding:30px; max-width:600px;">
                    <h3>MATERIALS COMMAND</h3>
                    <div style="display:flex;" id="matSteps">
                        <div id="mstep1" class="step-dot active">1. JO</div>
                        <div id="mstep2" class="step-dot">2. NAME</div>
                        <div id="mstep3" class="step-dot">3. ITEM</div>
                        <div id="mstep4" class="step-dot">4. QTY</div>
                        <div id="mstep5" class="step-dot">5. KGS</div>
                    </div>
                    <div id="visual-scanner" class="scanner-box" style="margin-top:20px;">
                        <div id="scan-title">SCAN J.O.</div>
                        <div id="scan-subtitle" style="font-size:12px;">LAST 4 DIGITS</div>
                        <input type="text" id="mat-scanner-input" style="width:100%; margin-top:12px; padding:12px; font-size:24px; text-align:center; background:#222; color:white; border-radius:60px;" autocomplete="off">
                    </div>
                    <div id="material-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:20px;"></div>
                    <button onclick="resetMatScanner()" style="margin-top:15px;">RESET</button>
                    <button onclick="openMatSettings()" style="margin-top:5px;">⚙️ SETTINGS</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Attendance modal stub to avoid missing function -->
<div id="attendanceOverlay" style="display:none;"></div>
<div id="finishOverlay" style="display:none;"></div>
<div id="modal-issuance" class="modal-overlay"><div class="modal-content"></div></div>
<div id="modal-return" class="modal-overlay"><div class="modal-content"></div></div>
<div id="modal-settings" class="modal-overlay"><div class="modal-content"></div></div>
<div id="jos-toast"></div>
<div id="startSlip" style="display:none;"></div><div id="finishSlip" style="display:none;"></div><div id="print-area"></div>
<div id="joSchedulerOverlay" style="display:none;"></div>
<div id="joCostOverlay" style="display:none;"></div>

<script>
    // ======================== GLOBAL STORAGE & HELPERS ========================
    window.Store = {
        getItem: function(k) { try { return localStorage.getItem(k); } catch(e) { return null; } },
        setItem: function(k,v) { try { localStorage.setItem(k,v); } catch(e) { console.warn(e); } },
        removeItem: function(k) { try { localStorage.removeItem(k); } catch(e) {} }
    };
    // LABOR GLOBALS
    var samDB = JSON.parse(Store.getItem('prod_sam_v7')) || { "SEWING":0.9, "PACKING":0.9, "CUTTING":0.5, "PUNCHING":0.4 };
    var logs = JSON.parse(Store.getItem('logs_v7')) || [];
    var workerPhotos = JSON.parse(Store.getItem('worker_photos_v7')) || {};
    var laborRate = parseFloat(Store.getItem('labor_rate_v7')) || 106;
    var statsArchive = JSON.parse(Store.getItem('stats_archive_v7')) || [];
    var joHistory = JSON.parse(Store.getItem('jo_history_v8')) || [];
    var josData = JSON.parse(Store.getItem('jos_schedule_v1')) || {};

    function saveLocally() { Store.setItem('logs_v7', JSON.stringify(logs)); renderLaborTable(); renderSideLeaderboard(); renderJOHistory(); }
    function saveHistory() { Store.setItem('jo_history_v8', JSON.stringify(joHistory)); renderJOHistory(); }
    function renderJOHistory() {
        var el = document.getElementById('joHistoryList');
        if(!el) return;
        if(!joHistory.length){ el.innerHTML='<div>No J.O. history.</div>'; return; }
        el.innerHTML = joHistory.map((j,idx)=>`<div class="joh-row" onclick="reuseJO('${j.jo}')"><span>${j.jo}</span><span style="font-size:10px;">${j.date}</span><button onclick="event.stopPropagation();joHistory.splice(${idx},1);saveHistory();">❌</button></div>`).join('');
    }
    function reuseJO(jo){ document.getElementById('displayJO').innerText=jo; document.getElementById('displayJO2').innerText=jo; document.getElementById('step1').style.display='none'; document.getElementById('step2').style.display='block'; document.getElementById('scanName').focus(); filterWorkerSuggestions(''); }
    function renderSideLeaderboard(){ let lb=document.getElementById('sideLeaderboardList'); if(lb) lb.innerHTML='🏆 Demo: complete jobs to see points.'; }
    function renderLaborTable(){ let grid=document.getElementById('workerGrid'); if(!grid) return; let html=''; for(let w of [...new Set(logs.map(l=>l.operator))]){ html+=`<div class="worker-card"><div class="worker-header"><img class="worker-photo" src="${workerPhotos[w]||'https://via.placeholder.com/80'}"><div class="worker-name">${w}</div></div><div class="job-list">${logs.filter(l=>l.operator===w).map(l=>`<div class="job-item"><span>${l.jo} | ${l.process}</span><span class="eff-badge ${l.timeOut?(l.efficiency>=70?'bg-pass':'bg-fail'):'bg-active'}">${l.efficiency||'ACTIVE'}</span><button class="btn-row-del" onclick="deleteEntry('${l.uid}')">🗑</button></div>`).join('')}</div></div>`; } grid.innerHTML=html || '<p>No workers yet.</p>'; }
    function deleteEntry(uid){ logs=logs.filter(l=>l.uid!=uid); saveLocally(); }
    function calculateNetMinutes(st, en){ return 60; }
    function resetSteps(){ document.getElementById('step1').style.display='block'; document.getElementById('step2').style.display='none'; document.getElementById('step3').style.display='none'; document.getElementById('scanJO').focus(); }
    function filterWorkerSuggestions(val){ let listDiv=document.getElementById('workerSuggestList'); if(!listDiv) return; let names=[...new Set(logs.map(l=>l.operator).filter(Boolean))]; let filtered=names.filter(n=>n.toUpperCase().includes(val.toUpperCase())).slice(0,5); listDiv.innerHTML=filtered.map(n=>`<div class="worker-suggestion" onclick="selectWorkerName('${n}')"><span>${n}</span></div>`).join(''); }
    function selectWorkerName(name){ document.getElementById('displayName').innerText=name; document.getElementById('step2').style.display='none'; document.getElementById('step3').style.display='block'; renderProcessPicker(); }
    function renderProcessPicker(){ let grid=document.getElementById('procPickerGrid'); grid.innerHTML=Object.keys(samDB).map(p=>`<button class="proc-btn" onclick="startNewJob('${p}')">${p}<br><small>${samDB[p]}</small></button>`).join(''); }
    function startNewJob(proc){ let entry={ uid:'J'+Date.now(), date:new Date().toLocaleDateString('sv-SE'), operator:document.getElementById('displayName').innerText, jo:document.getElementById('displayJO').innerText, process:proc, sam:samDB[proc], timeIn:new Date().toISOString(), qty:0, efficiency:0 }; logs.unshift(entry); saveLocally(); resetSteps(); alert(`Started ${proc} for ${entry.operator}`); }
    
    // Attendance mock
    function openAttendance(){ alert("Attendance module ready (demo)."); }
    function openJOScheduler(){ alert("J.O. Scheduler (light version active)."); }
    function openJOCostTracker(){ alert("J.O. Cost Tracker (integrated)."); }
    function exportToCostlive(){ alert("Sync file exported (simulated)."); }
    function resetDay(){ if(confirm("Reset active jobs?")){ logs=[]; saveLocally(); } }
    function toggleAdmin(){ let p=document.getElementById('adminPanel'); if(p) p.style.display=p.style.display==='none'?'block':'none'; }
    function openStatsWithLock(){ alert("Worker Stats (protected view)."); }
    function backToMenu(){ document.getElementById('laborView').style.display='none'; document.getElementById('materialsView').style.display='none'; document.getElementById('selectionView').style.display='flex'; }
    function switchToLabor(){ document.getElementById('selectionView').style.display='none'; document.getElementById('materialsView').style.display='none'; document.getElementById('laborView').style.display='block'; initLabor(); }
    function switchToMaterials(){ document.getElementById('selectionView').style.display='none'; document.getElementById('laborView').style.display='none'; document.getElementById('materialsView').style.display='flex'; initMaterials(); }
    function initLabor(){ renderLaborTable(); renderProcessPicker(); renderJOHistory(); renderSideLeaderboard(); setupLaborAutoFlow(); }
    
    function setupLaborAutoFlow(){
        let scanJO = document.getElementById('scanJO');
        if(scanJO && !scanJO._listener){
            scanJO.addEventListener('keydown', function(e) { if(e.key==='Enter') { let val=e.target.value.trim(); if(val) { document.getElementById('displayJO').innerText=val; document.getElementById('displayJO2').innerText=val; document.getElementById('step1').style.display='none'; document.getElementById('step2').style.display='block'; document.getElementById('scanName').focus(); e.target.value=''; } } });
            scanJO._listener=true;
        }
        let scanName = document.getElementById('scanName');
        if(scanName && !scanName._listener){
            scanName.addEventListener('keydown', function(e){ if(e.key==='Enter') { let val=e.target.value.trim(); if(val) selectWorkerName(val); } });
            scanName._listener=true;
        }
        let scanProcess = document.getElementById('scanProcessInp');
        if(scanProcess && !scanProcess._listener){
            scanProcess.addEventListener('keydown', function(e){ if(e.key==='Enter') { let p=e.target.value.trim().toUpperCase(); if(samDB[p]) startNewJob(p); else alert("Process not found in SAM DB"); e.target.value=''; } });
            scanProcess._listener=true;
        }
    }
    
    // ======================== MATERIALS SYSTEM (fully working) ========================
    var matData = JSON.parse(Store.getItem('rd_materials')) || { "U PLY ADHESIVE":{price:177,unitWeight:1}, "RUGBY UTAC":{price:155,unitWeight:1}, "PAINT":{price:250,unitWeight:1} };
    var pendingMat = JSON.parse(Store.getItem('rd_sidebar_final')) || [];
    var mStep = 1, mBuf = { jo:'', name:'', item:'', q:0, w:0 };
    function initMaterials(){ renderMatSidebar(); initMatGrid(); resetMatScanner(); setupMatScannerListener(); }
    function setupMatScannerListener(){
        let inp = document.getElementById('mat-scanner-input');
        if(!inp) return;
        inp.removeEventListener('keydown', matHandler);
        inp.addEventListener('keydown', matHandler);
    }
    function matHandler(e){
        if(e.key !== 'Enter') return;
        let raw = e.target.value.trim();
        if(!raw) return;
        if(mStep===1){ mBuf.jo = raw.toUpperCase(); mStep=2; updateMatUI(); e.target.value=''; return; }
        if(mStep===2){ mBuf.name = raw.toUpperCase(); mStep=3; updateMatUI(); e.target.value=''; return; }
        if(mStep===3){ if(matData[raw.toUpperCase()]){ mBuf.item = raw.toUpperCase(); mStep=4; updateMatUI(); } else alert("Material not in list"); e.target.value=''; return; }
        if(mStep===4){ let qty = parseFloat(raw); if(!isNaN(qty)){ mBuf.q = qty; mStep=5; updateMatUI(); } else alert("Invalid qty"); e.target.value=''; return; }
        if(mStep===5){ let kg = parseFloat(raw); if(!isNaN(kg)){ mBuf.w = kg; finalizeIssuance(); } else alert("Invalid weight"); e.target.value=''; return; }
    }
    function updateMatUI(){
        document.querySelectorAll('.step-dot').forEach(d=>d.classList.remove('active','complete'));
        for(let i=1;i<mStep;i++) document.getElementById(`mstep${i}`).classList.add('complete');
        document.getElementById(`mstep${mStep}`).classList.add('active');
        let titleDiv = document.getElementById('scan-title');
        if(mStep===1) titleDiv.innerText='SCAN J.O.';
        else if(mStep===2) titleDiv.innerText='SCAN WORKER';
        else if(mStep===3) titleDiv.innerText='CHOOSE ITEM';
        else if(mStep===4) titleDiv.innerText='ENTER QTY (PCS)';
        else titleDiv.innerText='ENTER WEIGHT (KG)';
        document.getElementById('material-grid').style.display = mStep===3 ? 'grid' : 'none';
    }
    function initMatGrid(){
        let g = document.getElementById('material-grid'); if(!g) return;
        g.innerHTML = Object.keys(matData).map(m => `<button class="mat-btn" onclick="mBuf.item='${m}'; mStep=4; updateMatUI();">${m}</button>`).join('');
    }
    function finalizeIssuance(){
        let itemData = { id:Date.now(), n:mBuf.name, j:mBuf.jo, i:mBuf.item, q:mBuf.q, w:mBuf.w };
        pendingMat.push(itemData);
        Store.setItem('rd_sidebar_final', JSON.stringify(pendingMat));
        renderMatSidebar();
        alert(`Issued ${mBuf.q} pcs of ${mBuf.item} to ${mBuf.name}`);
        resetMatScanner();
        closeMatModals();
    }
    function renderMatSidebar(){
        let listDiv = document.getElementById('pending-list'); if(!listDiv) return;
        listDiv.innerHTML = pendingMat.map(it => `<div class="pending-card" onclick="openReturnModal(${JSON.stringify(it).replace(/"/g, '&quot;')})">
            <div><strong>${it.i}</strong></div><div>${it.n}</div><div>JO: ${it.j}</div>
            <button onclick="event.stopPropagation();pendingMat=pendingMat.filter(p=>p.id!==${it.id});Store.setItem('rd_sidebar_final',JSON.stringify(pendingMat));renderMatSidebar();" style="background:red; color:white; margin-top:6px;">REMOVE</button>
        </div>`).join('');
    }
    function openReturnModal(item){
        activeMat = item;
        document.getElementById('modal-return').style.display='flex';
        let modalDiv = document.getElementById('modal-return');
        modalDiv.innerHTML = `<div class="modal-content"><h3>Return Material</h3><p>${item.i} | JO: ${item.j} | Worker: ${item.n}</p><label>Return KG:</label><input type="number" id="retWeight" step="0.001" style="width:100%; padding:8px;"><button onclick="saveReturn()">CONFIRM RETURN</button><button onclick="closeMatModals()">CANCEL</button></div>`;
    }
    function saveReturn(){
        let retWeight = parseFloat(document.getElementById('retWeight')?.value) || 0;
        if(activeMat){
            pendingMat = pendingMat.filter(p=>p.id !== activeMat.id);
            Store.setItem('rd_sidebar_final', JSON.stringify(pendingMat));
            alert(`Returned ${retWeight} kg. Ticket completed.`);
            renderMatSidebar();
        }
        closeMatModals();
        resetMatScanner();
    }
    function resetMatScanner(){ mStep=1; mBuf={jo:'',name:'',item:'',q:0,w:0}; updateMatUI(); document.getElementById('mat-scanner-input').value=''; }
    function closeMatModals(){ document.querySelectorAll('.modal-overlay').forEach(m=>m.style.display='none'); }
    function openMatSettings(){ alert("Materials Settings: you can add materials via console."); }
    
    // additional stub for attendance/stat
    function jocRefresh(){}
    window.addEventListener('load', function(){
        initLabor();
        // ensure selection view is visible initially
        document.getElementById('selectionView').style.display = 'flex';
        document.getElementById('laborView').style.display = 'none';
        document.getElementById('materialsView').style.display = 'none';
        // manual fix for missing references
        if(!document.getElementById('joHistoryList')) console.log("fix");
    });
</script>
</body>
</html>
